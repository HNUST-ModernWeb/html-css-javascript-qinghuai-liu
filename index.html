<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息卡片 | 课堂作业（含localStorage持久化）</title>
    <style>
        /* ==================== 主题颜色变量定义 ==================== */
        /* 亮色主题（默认）颜色变量 */
        :root {
            --bg-body: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: white;
            --text-primary: #1e2a3e;
            --text-secondary: #4a627a;
            --border-light: #e9ecef;
            --edit-bg: #f9fafc;
            --input-border: #cfdfed;
            --input-bg: white;
            --label-color: #2c3e50;
            --upload-bg: #eef2f7;
            --upload-border: #90a4bc;
            --upload-color: #2c5f6e;
            --upload-hover-bg: #e2e8f0;
            --toast-bg: #e0f2e9;
            --toast-color: #2c7a4d;
            --footer-color: #7f8c8d;
            --btn-save: #1e4668;
            --btn-save-hover: #0f2f49;
            --btn-reset: #8b5a2b;
            --btn-reset-hover: #5e3a1c;
        }

        /* 深色主题颜色变量（通过 .dark-theme 类覆盖） */
        .dark-theme {
            --bg-body: linear-gradient(135deg, #1a1e2c 0%, #2a2e45 100%);
            --card-bg: #2d2f3e;
            --text-primary: #eef2ff;
            --text-secondary: #b9c3d9;
            --border-light: #4a4f6e;
            --edit-bg: #1f2232;
            --input-border: #4a4f6e;
            --input-bg: #3a3d55;
            --label-color: #cbd5e6;
            --upload-bg: #252a3a;
            --upload-border: #5a6e8a;
            --upload-color: #aac8e6;
            --upload-hover-bg: #2f3548;
            --toast-bg: #2a4b3a;
            --toast-color: #b8e6cc;
            --footer-color: #9aa8bf;
            --btn-save: #3b6e8b;
            --btn-save-hover: #2c5570;
            --btn-reset: #a06e3c;
            --btn-reset-hover: #8b5a2b;

            /* 深色模式下标题强制显示为白色（覆盖内联样式） */
            h1 {
                color: #ffffff !important;
            }
        }

        /* 全局重置与平滑过渡 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        /* 页面背景使用主题变量 */
        body {
            background: var(--bg-body);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 20px;
        }

        /* 卡片样式：居中、阴影、圆角 */
        .card {
            max-width: 550px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 32px;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            padding: 28px 30px 35px;
            text-align: center;
            transition: transform 0.25s;
        }

        /* 卡片悬停微动画（加分项） */
        .card:hover {
            transform: translateY(-5px);
        }

        /* 主题切换按钮样式 */
        .theme-btn {
            background: transparent;
            border: 1px solid var(--text-secondary);
            border-radius: 40px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-primary);
            transition: all 0.2s;
            margin-bottom: 12px;
        }
        .theme-btn:hover {
            background: var(--text-secondary);
            color: var(--card-bg);
        }

        /* 头像区域：圆形、居中 */
        .avatar-section {
            margin-bottom: 20px;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--card-bg);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            background: #eef2f7;
        }

        /* 展示区（姓名 + 简介） */
        .display-info {
            margin: 20px 0 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-light);
        }
        .display-name {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 10px;
            word-break: break-word;
        }
        .display-bio {
            font-size: 1rem;
            color: var(--text-secondary);
            line-height: 1.5;
            background: var(--edit-bg);
            padding: 10px 15px;
            border-radius: 24px;
            display: inline-block;
            max-width: 100%;
            word-break: break-word;
        }

        /* 编辑区样式 */
        .edit-area {
            background: var(--edit-bg);
            border-radius: 28px;
            padding: 20px 20px 15px;
            margin-top: 10px;
        }
        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }
        .input-group label {
            display: block;
            font-weight: 600;
            color: var(--label-color);
            margin-bottom: 6px;
            font-size: 0.9rem;
        }
        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--input-border);
            border-radius: 60px;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            background: var(--input-bg);
            color: var(--text-primary);
            transition: 0.2s;
        }
        .input-group textarea {
            border-radius: 24px;
            resize: vertical;
            min-height: 70px;
        }
        /* 输入框聚焦效果 */
        .input-group input:focus,
        .input-group textarea:focus {
            border-color: #4f9da6;
            box-shadow: 0 0 0 3px rgba(79, 157, 166, 0.2);
        }

        /* 自定义上传头像按钮 */
        .upload-btn {
            background-color: var(--upload-bg);
            border: 1px dashed var(--upload-border);
            padding: 10px;
            border-radius: 40px;
            text-align: center;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--upload-color);
            transition: 0.2s;
            margin-bottom: 18px;
        }
        .upload-btn:hover {
            background-color: var(--upload-hover-bg);
            border-color: #4f9da6;
        }
        /* 隐藏原生文件输入框，用自定义按钮触发 */
        #avatarUpload {
            display: none;
        }

        /* 保存按钮样式 */
        .save-btn {
            background: var(--btn-save);
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
            letter-spacing: 1px;
            transition: 0.25s;
            margin-top: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .save-btn:hover {
            background: var(--btn-save-hover);
            transform: scale(1.01);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.15);
        }

        /* 重置按钮样式 */
        .reset-btn {
            background: var(--btn-reset);
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: 0.25s;
        }
        .reset-btn:hover {
            background: var(--btn-reset-hover);
            transform: scale(1.01);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.15);
        }

        /* 提示消息（toast）样式 */
        .toast-msg {
            margin-top: 18px;
            font-size: 0.8rem;
            color: var(--toast-color);
            background: var(--toast-bg);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 30px;
            opacity: 0;
            transition: 0.2s;
        }
        .toast-msg.show {
            opacity: 1;
        }
        /* 底部脚注 */
        footer {
            margin-top: 20px;
            font-size: 0.7rem;
            color: var(--footer-color);
        }
    </style>
</head>
<body>
<div class="card">
    <!-- 主题切换按钮行，右对齐 -->
    <div style="display: flex; justify-content: flex-end;">
        <button id="themeToggle" class="theme-btn">🌙 深色模式</button>
    </div>

    <!-- 页面主标题（内联样式保留原颜色，深色模式会强制覆盖） -->
    <h1 style="font-size: 1.8rem; color: #2c3e50; margin-bottom: 10px;">📇 个人信息卡片</h1>

    <!-- 头像展示区 -->
    <div class="avatar-section">
        <img id="avatarImg" class="avatar" src="https://tse4-mm.cn.bing.net/th/id/OIP-C.g5NtJoxrdJW9QMn1PeO-8AHaHb?w=194&h=195&c=7&r=0&o=5&dpr=1.5&pid=1.7" alt="头像">
    </div>

    <!-- 展示区：姓名和简介（点击保存后更新这里） -->
    <div class="display-info">
        <div class="display-name" id="displayName">清淮</div>
        <div class="display-bio" id="displayBio">✨我是一名湖南科技大学的学生，我来自计科八班，我的爱好是听歌。</div>
    </div>

    <!-- 编辑区：用户输入姓名、简介、上传头像 -->
    <div class="edit-area">
        <div class="input-group">
            <label>✏️ 编辑姓名</label>
            <input type="text" id="editName" placeholder="输入新姓名" value="清淮">
        </div>
        <div class="input-group">
            <label>📝 编辑简介</label>
            <textarea id="editBio" rows="2" placeholder="输入个人简介">✨我是一名湖南科技大学的学生，我来自计科八班，我的爱好是听歌。</textarea>
        </div>

        <!-- 自定义上传按钮，点击触发隐藏的文件输入框 -->
        <div class="upload-btn" onclick="document.getElementById('avatarUpload').click()">
            📸 点击上传头像
        </div>
        <input type="file" id="avatarUpload" accept="image/jpeg, image/png, image/jpg">

        <!-- 保存修改按钮 -->
        <button class="save-btn" id="saveBtn">💾 保 存 修 改</button>
        <!-- 重置所有数据按钮 -->
        <button class="reset-btn" id="resetBtn">🗑️ 重置所有数据</button>
        <div id="toastMsg" class="toast-msg">✅ 已更新个人信息</div>
    </div>
    <footer>✨ 修改后会自动保存，刷新页面不会丢失</footer>
</div>

<script>
    // ==================== DOM 元素获取 ====================
    const avatarImg = document.getElementById('avatarImg');
    const avatarUpload = document.getElementById('avatarUpload');
    const displayName = document.getElementById('displayName');
    const displayBio = document.getElementById('displayBio');
    const editName = document.getElementById('editName');
    const editBio = document.getElementById('editBio');
    const saveBtn = document.getElementById('saveBtn');
    const toastMsg = document.getElementById('toastMsg');

    // ==================== localStorage 持久化辅助函数 ====================
    // 保存当前展示区的内容（姓名、简介、头像）到 localStorage
    function saveToLocalStorage() {
        localStorage.setItem('userName', displayName.innerText);
        localStorage.setItem('userBio', displayBio.innerText);
        localStorage.setItem('userAvatar', avatarImg.src);
    }

    // 页面加载时从 localStorage 读取保存的数据并恢复
    function loadFromLocalStorage() {
        const savedName = localStorage.getItem('userName');
        const savedBio = localStorage.getItem('userBio');
        const savedAvatar = localStorage.getItem('userAvatar');

        if (savedName) {
            displayName.innerText = savedName;
            editName.value = savedName;        // 同步到编辑框
        }
        if (savedBio) {
            displayBio.innerText = savedBio;
            editBio.value = savedBio;          // 同步到编辑框
        }
        if (savedAvatar) {
            avatarImg.src = savedAvatar;
        }
    }

    // 显示短暂提示消息（toast），1.8秒后自动隐藏
    function showToast(msg) {
        toastMsg.innerText = `✅ ${msg}`;
        toastMsg.classList.add('show');
        setTimeout(() => {
            toastMsg.classList.remove('show');
        }, 1800);
    }

    // ==================== 保存修改功能 ====================
    // 将编辑框中的姓名和简介更新到展示区，并保存到 localStorage
    function saveProfile() {
        const newName = editName.value.trim();
        const newBio = editBio.value.trim();

        // 处理空值：若为空则设置默认文本
        if (newName === "") {
            displayName.innerText = "未命名用户";
            showToast("姓名不能为空，已设为默认");
        } else {
            displayName.innerText = newName;
        }

        if (newBio === "") {
            displayBio.innerText = "这个人很懒，还没写简介～";
        } else {
            displayBio.innerText = newBio;
        }

        // 同步编辑框（如果用户留空，将默认值写回编辑框）
        if (newName === "") editName.value = "未命名用户";
        if (newBio === "") editBio.value = "这个人很懒，还没写简介～";

        // 保存到 localStorage
        saveToLocalStorage();
        showToast("✨ 姓名和简介已保存！刷新后依然保留");
    }

    // ==================== 头像上传功能 ====================
    // 监听文件选择变化，读取图片并更新头像，同时保存
    avatarUpload.addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (file) {
            // 检查文件类型
            if (!file.type.startsWith('image/')) {
                alert('请选择图片文件！');
                return;
            }
            const reader = new FileReader();
            reader.onload = function(e) {
                avatarImg.src = e.target.result;
                saveToLocalStorage();          // 头像更新后立即保存
                showToast('头像已更新并保存 👤');
            };
            reader.readAsDataURL(file);
        }
    });

    // ==================== 页面初始化 ====================
    // 页面加载时：先恢复 localStorage 中的数据，再同步编辑框
    window.addEventListener('DOMContentLoaded', () => {
        loadFromLocalStorage();
        // 确保编辑框的值与展示区一致
        editName.value = displayName.innerText;
        editBio.value = displayBio.innerText;
    });

    // 绑定保存按钮点击事件
    saveBtn.addEventListener('click', saveProfile);

    // ==================== 重置数据功能 ====================
    // 清除 localStorage 中存储的所有个人信息，然后刷新页面恢复默认值
    const resetBtn = document.getElementById('resetBtn');
    function resetAllData() {
        localStorage.removeItem('userName');
        localStorage.removeItem('userBio');
        localStorage.removeItem('userAvatar');
        location.reload();   // 刷新页面，重新加载默认数据
    }
    resetBtn.addEventListener('click', resetAllData);

    // ==================== 主题切换功能 ====================
    const themeToggle = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('theme');

    // 应用已保存的主题（如果用户之前选择了深色模式）
    if (savedTheme === 'dark') {
        document.body.classList.add('dark-theme');
        themeToggle.textContent = '☀️ 亮色模式';
    }

    // 切换主题：添加/移除 dark-theme 类，更新按钮文字，并保存用户偏好
    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark-theme');
        const isDark = document.body.classList.contains('dark-theme');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        themeToggle.textContent = isDark ? '☀️ 亮色模式' : '🌙 深色模式';
    });
</script>
</body>
</html>
